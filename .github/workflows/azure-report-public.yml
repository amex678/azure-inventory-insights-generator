name: Azure Inventory Report - Public OIDC

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

permissions:
  id-token: write
  contents: read

env:
  PUBLISH_REPO: amex678/azure-inventory-insights-reports-published
  PUBLISH_BRANCH: main

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Az PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Az -Scope CurrentUser -Repository PSGallery -Force
          Install-Module -Name Az.Advisor -Scope CurrentUser -Repository PSGallery -Force

      - name: Generate Azure inventory datasets
        shell: pwsh
        run: |
          ./scripts/Export-AzResources.ps1
          ./scripts/Export-AzRoleAssignments.ps1
          ./scripts/Export-AzNsgRules.ps1
          ./scripts/Export-AzDefenderRecommendations.ps1
          ./scripts/Export-AzAdvisorRecommendations.ps1

      - name: Build comprehensive HTML report
        shell: pwsh
        run: |
          ./scripts/New-AzComprehensiveAdminReport.ps1

      - name: Upload generated report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: azure-inventory-report
          path: output/
          if-no-files-found: error
          retention-days: 30

      - name: Load publish SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PUBLISH_REPO_SSH_KEY }}

      - name: Publish reports to external repository
        shell: bash
        run: |
          set -euo pipefail

          run_date="$(date -u +%Y-%m-%d)"
          publish_dir="$RUNNER_TEMP/published-repo"

          git clone "git@github.com:${PUBLISH_REPO}.git" "$publish_dir"

          mkdir -p "$publish_dir/reports/history/$run_date"
          mkdir -p "$publish_dir/reports/latest"

          cp -R output/. "$publish_dir/reports/history/$run_date/"
          rm -rf "$publish_dir/reports/latest"/*
          cp -R output/. "$publish_dir/reports/latest/"
          cp output/comprehensive-report.html "$publish_dir/index.html"
          touch "$publish_dir/.nojekyll"

          cd "$publish_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No report changes to publish"
            exit 0
          fi
          git commit -m "Publish Azure inventory report [skip ci]"
          git push origin "${PUBLISH_BRANCH}"
