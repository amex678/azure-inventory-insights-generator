name: Azure Inventory Report - Public OIDC

on:
  workflow_dispatch:
  schedule:
    # Production runs 3x/day, spaced 8h apart, at :07 to dodge the top-of-hour peak.
    # (Note: each run consumes a Copilot premium request. 3x/day = ~90 requests/month.)
    - cron: '7 2 * * *'    # 02:07 UTC (11:07 JST)
    - cron: '7 10 * * *'   # 10:07 UTC (19:07 JST)
    - cron: '7 18 * * *'   # 18:07 UTC (03:07 JST)

# Single-flight: never run two report generations at once (avoids duplicate agent tasks).
concurrency:
  group: azure-report
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pages: write
  pull-requests: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # Defense-in-depth against self-trigger loops (agent commits never run this workflow).
    if: ${{ github.actor != 'copilot-swe-agent[bot]' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Install Az PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Az -Scope CurrentUser -Repository PSGallery -Force
          Install-Module -Name Az.Advisor -Scope CurrentUser -Repository PSGallery -Force

      - name: Generate Azure inventory datasets
        shell: pwsh
        run: |
          # Never carry a committed body.json into the runtime output/ (avoid stale prose).
          Remove-Item output/body.json -ErrorAction SilentlyContinue
          ./scripts/Export-AzResources.ps1
          ./scripts/Export-AzRoleAssignments.ps1
          ./scripts/Export-AzNsgRules.ps1
          ./scripts/Export-AzDefenderRecommendations.ps1
          ./scripts/Export-AzAdvisorRecommendations.ps1

      - name: Export deterministic facts (single source of truth)
        shell: pwsh
        run: |
          ./scripts/Export-AzFacts.ps1
          if (-not (Test-Path output/facts.json)) { throw 'facts.json was not produced.' }

      - name: Build rule-based fallback report (baseline)
        shell: pwsh
        run: |
          # Render the deterministic rule-based HTML now so a valid report always exists,
          # even if the Copilot Agent path fails. Overwritten later only if the AI gates pass.
          ./scripts/New-AzComprehensiveAdminReport.ps1 -RunId $env:GITHUB_RUN_ID
          if (-not (Test-Path output/comprehensive-report.html)) { throw 'baseline report not produced.' }

      - name: Launch Copilot Cloud Agent (narrative authoring)
        id: agent
        continue-on-error: true
        shell: pwsh
        env:
          COPILOT_AGENT_PAT: ${{ secrets.COPILOT_AGENT_PAT }}
          COPILOT_AGENT_MODEL: ${{ vars.COPILOT_AGENT_MODEL }}
        run: |
          ./scripts/Start-CopilotReportTask.ps1 `
            -Owner '${{ github.repository_owner }}' `
            -Repo '${{ github.event.repository.name }}' `
            -BaseRef '${{ github.event.repository.default_branch }}' `
            -TimeoutMinutes 25 `
            -PollSeconds 20 `
            -OutputPath "$env:RUNNER_TEMP/agent-task.json"

      - name: Quality gate, auto-fix retry, and final render
        id: gate
        if: ${{ !cancelled() }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT is needed here too, to launch the auto-fix task on gate failure.
          COPILOT_AGENT_PAT: ${{ secrets.COPILOT_AGENT_PAT }}
          COPILOT_AGENT_MODEL: ${{ vars.COPILOT_AGENT_MODEL }}
          # Max in-run auto-fix attempts (repo variable; default 1). 0 disables auto-fix.
          MAX_FIX_RETRIES: ${{ vars.MAX_FIX_RETRIES }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          # Pass agent outputs via env (never interpolate agent-controlled data into code).
          AGENT_SUCCESS: ${{ steps.agent.outputs.success }}
          AGENT_HEAD_REF: ${{ steps.agent.outputs.head_ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          $ErrorActionPreference = 'Continue'
          $mode = 'fallback'
          $reason = ''
          $prNum = ''
          $fixAttempts = 0
          $success = $env:AGENT_SUCCESS
          $headRef = $env:AGENT_HEAD_REF
          $default = if ($env:DEFAULT_BRANCH) { $env:DEFAULT_BRANCH } else { 'main' }
          $maxRetries = 1
          if ($env:MAX_FIX_RETRIES -match '^\d+$') { $maxRetries = [int]$env:MAX_FIX_RETRIES }
          $tmpBody = Join-Path $env:RUNNER_TEMP 'agent-body.json'

          function Add-Summary { param([string]$t) if ($env:GITHUB_STEP_SUMMARY) { Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $t -Encoding utf8 } }

          # Fetch the PR branch and extract output/body.json to an ISOLATED temp path.
          # Returns $true on success. Never stages into the working tree / output/.
          function Get-BodyFromBranch {
            param([string]$Ref)
            git fetch origin $Ref 2>&1 | Out-Host
            git cat-file -e "FETCH_HEAD:output/body.json" 2>$null
            if ($LASTEXITCODE -ne 0) { return $false }
            git show "FETCH_HEAD:output/body.json" | Set-Content -Path $tmpBody -Encoding utf8
            return (Test-Path $tmpBody)
          }

          # Run all gates against $tmpBody. Returns a hashtable @{ ok; reason; feedback }.
          # feedback aggregates the failing gates' human-readable output for the auto-fix prompt.
          function Invoke-Gates {
            $fb = [System.Collections.Generic.List[string]]::new()

            # run_id freshness
            try {
              $bodyDoc  = Get-Content $tmpBody -Raw -Encoding UTF8 | ConvertFrom-Json
              $factsDoc = Get-Content output/facts.json -Raw -Encoding UTF8 | ConvertFrom-Json
              $bodyRun  = [string]$bodyDoc.generator.run_id
              $factsRun = [string]$factsDoc.meta.runId
              if ($factsRun -and $bodyRun -ne $factsRun) {
                $fb.Add("generator.run_id ('$bodyRun') が facts.meta.runId ('$factsRun') と一致していません。run_id を '$factsRun' に設定してください。")
                return @{ ok = $false; reason = 'run_id mismatch'; feedback = ($fb -join "`n") }
              }
            } catch {
              return @{ ok = $false; reason = "body/facts parse error"; feedback = "body.json が JSON として解析できません: $($_.Exception.Message)" }
            }

            # allowlist (diff must include body.json and nothing else)
            if ($prNum) { $changed = (gh pr diff $prNum --name-only) -join "`n" }
            else {
              $base = (git merge-base "origin/$default" FETCH_HEAD).Trim()
              $changed = (git diff --name-only $base FETCH_HEAD) -join "`n"
            }
            if ($changed -notmatch '(?m)^output/body\.json$') {
              $fb.Add("PR の差分に output/body.json が含まれていません。output/body.json のみを変更してください。変更ファイル: $changed")
              return @{ ok = $false; reason = 'body.json not in diff'; feedback = ($fb -join "`n") }
            }
            $o = (pwsh -NoProfile -File scripts/ci/Test-BodyAllowlist.ps1 -ChangedFiles $changed 2>&1 | Out-String)
            if ($LASTEXITCODE -ne 0) { $fb.Add("[allowlist] $o"); return @{ ok = $false; reason = 'allowlist gate failed'; feedback = ($fb -join "`n") } }

            # factcheck
            $o = (pwsh -NoProfile -File scripts/ci/Test-BodyFactcheck.ps1 -BodyJson $tmpBody -FactsJson output/facts.json 2>&1 | Out-String)
            if ($LASTEXITCODE -ne 0) { $fb.Add("[factcheck] $o"); return @{ ok = $false; reason = 'factcheck gate failed'; feedback = ($fb -join "`n") } }

            # sanitize
            $o = (pwsh -NoProfile -File scripts/ci/Test-BodySanitize.ps1 -BodyJson $tmpBody 2>&1 | Out-String)
            if ($LASTEXITCODE -ne 0) { $fb.Add("[sanitize] $o"); return @{ ok = $false; reason = 'sanitize gate failed'; feedback = ($fb -join "`n") } }

            return @{ ok = $true; reason = ''; feedback = '' }
          }

          try {
            # Validate the agent-controlled ref before using it anywhere.
            if ($success -eq 'true' -and $headRef -and ($headRef -match '^[A-Za-z0-9._/-]+$')) {
              Write-Host "Agent reported success. head_ref=$headRef"
              if (-not (Get-BodyFromBranch $headRef)) {
                $reason = 'PR branch did not contain output/body.json'
              } else {
                try { $prNum = (gh pr list --head $headRef --state open --json number --jq '.[0].number') } catch { $prNum = '' }

                while ($true) {
                  $g = Invoke-Gates
                  if ($g.ok) {
                    # Render AI narrative from the validated temp body.
                    try {
                      ./scripts/New-AzComprehensiveAdminReport.ps1 -BodyJson $tmpBody -RunId $env:GITHUB_RUN_ID
                      if (-not (Test-Path output/comprehensive-report.html)) { throw 'AI render produced no HTML' }
                      $mode = 'ai'
                    } catch {
                      $reason = "AI render failed: $($_.Exception.Message)"
                      ./scripts/New-AzComprehensiveAdminReport.ps1 -RunId $env:GITHUB_RUN_ID
                      $mode = 'fallback'
                    }
                    break
                  }

                  $reason = $g.reason

                  # Auto-fix retry: ask Copilot to fix the SAME PR branch using the gate feedback.
                  # Only content failures reach here; retries are strictly bounded and require the PAT.
                  if ($fixAttempts -lt $maxRetries -and $env:COPILOT_AGENT_PAT -and $headRef) {
                    $fixAttempts++
                    Write-Host "Gate failed ($($g.reason)). Launching auto-fix attempt $fixAttempts/$maxRetries."
                    Add-Summary "> [!NOTE]"
                    Add-Summary "> **Auto-fix attempt $fixAttempts** requested from Copilot ($($g.reason))  "
                    Add-Summary "> run_id: $($env:GITHUB_RUN_ID)"

                    ./scripts/Start-CopilotReportTask.ps1 `
                      -Owner $env:OWNER -Repo $env:REPO -BaseRef $default `
                      -HeadRef $headRef -ExtraInstructions $g.feedback `
                      -TimeoutMinutes 20 -PollSeconds 20 -NoGitHubOutput `
                      -OutputPath "$env:RUNNER_TEMP/agent-fix.json"

                    $fixOk = $false
                    try { $fm = Get-Content "$env:RUNNER_TEMP/agent-fix.json" -Raw -Encoding UTF8 | ConvertFrom-Json; $fixOk = [bool]$fm.success } catch {}
                    if (-not $fixOk) { $reason = "auto-fix task did not succeed ($($g.reason))"; break }
                    if (-not (Get-BodyFromBranch $headRef)) { $reason = 'auto-fix produced no body.json'; break }
                    continue
                  }
                  break
                }
              }
            } else {
              $reason = if ($success -ne 'true') { "agent did not succeed (success=$success)" } else { "missing/invalid head_ref" }
            }
          } catch {
            $reason = "gate step error: $($_.Exception.Message)"
            $mode = 'fallback'
          } finally {
            # Defensive: the AI body must never linger in output/ (would be published by Copy-Item output/*).
            Remove-Item output/body.json -ErrorAction SilentlyContinue
          }

          if ($mode -eq 'ai') {
            $fixNote = if ($fixAttempts -gt 0) { " (auto-fixed after $fixAttempts retry)" } else { '' }
            Add-Summary "> [!NOTE]"
            Add-Summary "> **Report narrative: Copilot Cloud Agent (AI)$fixNote**  "
            Add-Summary "> quality gates: passed  "
            Add-Summary "> run_id: $($env:GITHUB_RUN_ID)"
          } else {
            Add-Summary "> [!WARNING]"
            Add-Summary "> **Report narrative: rule-based fallback**  "
            Add-Summary "> reason: $reason (auto-fix attempts: $fixAttempts)  "
            Add-Summary "> run_id: $($env:GITHUB_RUN_ID)"
          }
          # Collapse to a single line so it is safe for the GITHUB_OUTPUT key=value format.
          $reason = ($reason -replace '[\r\n]+', ' ').Trim()
          Write-Host "render mode = $mode ; reason = $reason ; pr = $prNum ; fixAttempts = $fixAttempts"
          "mode=$mode"     | Add-Content -Path $env:GITHUB_OUTPUT
          "pr_number=$prNum" | Add-Content -Path $env:GITHUB_OUTPUT
          "reason=$reason" | Add-Content -Path $env:GITHUB_OUTPUT
          exit 0

      - name: Upload generated report artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: azure-inventory-report
          path: output/
          if-no-files-found: error
          retention-days: 30

      - name: Prepare report outputs for repository and Pages
        if: ${{ !cancelled() }}
        shell: pwsh
        run: |
          $runDate = Get-Date -Format 'yyyy-MM-dd'
          $historyDir = Join-Path 'reports/history' $runDate
          $latestDir = 'reports/latest'
          $pagesDir = '_site'

          New-Item -ItemType Directory -Path $historyDir -Force | Out-Null
          New-Item -ItemType Directory -Path $latestDir -Force | Out-Null
          New-Item -ItemType Directory -Path $pagesDir -Force | Out-Null

          Copy-Item -Path output/* -Destination $historyDir -Recurse -Force
          Copy-Item -Path output/* -Destination $latestDir -Recurse -Force
          Copy-Item -Path output/* -Destination $pagesDir -Recurse -Force

          Copy-Item -Path output/comprehensive-report.html -Destination (Join-Path $latestDir 'index.html') -Force
          Copy-Item -Path output/comprehensive-report.html -Destination (Join-Path $pagesDir 'index.html') -Force
          '' | Set-Content -Path (Join-Path $pagesDir '.nojekyll') -Encoding utf8

      - name: Commit report snapshot to repository
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Restrict staging strictly to reports/ (never commit temp/AI artifacts).
          git reset -q -- . || true
          git add -f reports/
          if git diff --cached --quiet -- reports/; then
            echo "No report changes to commit"
            exit 0
          fi
          git commit -m "Publish Azure inventory report (${{ steps.gate.outputs.mode }}) [skip ci]" -- reports/
          git push

      - name: Upload Pages artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Close agent vehicle PR
        # Publishing is done; the PR was only a delivery vehicle for body.json.
        # We do NOT merge it (avoids non-fast-forward races and keeps main free of runtime prose);
        # the closed PR + its branch history remain as the audit trail.
        if: ${{ !cancelled() && steps.gate.outputs.pr_number != '' }}
        shell: pwsh
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $pr = '${{ steps.gate.outputs.pr_number }}'
          $mode = '${{ steps.gate.outputs.mode }}'
          $reason = @'
          ${{ steps.gate.outputs.reason }}
          '@
          $msg = if ($mode -eq 'ai') {
            "Narrative consumed and published (mode=ai) by run $($env:GITHUB_RUN_ID). Closing delivery PR."
          } else {
            "Quality gate/agent did not pass ($reason). Published rule-based fallback in run $($env:GITHUB_RUN_ID). Closing PR."
          }
          gh pr close $pr --comment $msg --delete-branch

  deploy-pages:
    needs: generate-report
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
